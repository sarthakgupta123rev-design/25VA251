<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>java script variable</h1>
    <script>
        let x;
        const y = 23;
        var myName = "abes"; //container in js
        document.write(myName);
        console.log(myName);
        //js execution and scope(global and local)
        function demo(){
            var msg = "thanks";
            console.log(msg);
        }
        demo(); 
        //var declaration using let and const
        let msg2 = "thaks 2";
        console.log(msg2);

        const msg3 = "thanks 3";
        console.log(msg3);

    </script>
</body>
</html>
